name: Gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos; no GITLEAKS_LICENSE needed.
