name: Lighthouse CI

on:
  # Runs after Vercel (or any provider) reports a deployment_status = success.
  # This audits the real preview / production URL instead of a local build.
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to audit (defaults to production)"
        required: false
        default: "https://weather-forecast-next-one.vercel.app"

concurrency:
  group: lighthouse-${{ github.event.deployment_status.deployment_url || github.event.inputs.url || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse (desktop)
    # Only run for successful PRODUCTION deployments.
    # Preview deployments on Vercel include X-Robots-Tag: noindex which
    # drops Lighthouse SEO below 0.95 and cannot be disabled.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Resolve target URL
        id: target
        run: |
          # Always audit the stable production alias, not the per-deployment
          # URL (which is protected by Vercel deployment protection and
          # redirects to the SSO login page).
          URL="${{ github.event.inputs.url }}"
          if [ -z "$URL" ]; then
            URL="https://weather-forecast-next-one.vercel.app"
          fi
          # Strip trailing slash
          URL="${URL%/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Auditing: $URL"

      - name: Warm up URLs
        run: |
          for i in 1 2 3; do
            curl -s -o /dev/null "$URL/" || true
            curl -s -o /dev/null "$URL/favorites" || true
            sleep 2
          done
        env:
          URL: ${{ steps.target.outputs.url }}

      - name: Run Lighthouse CI against live URL
        run: |
          npx --yes @lhci/cli@latest autorun \
            --config=./lighthouserc.live.json \
            --collect.url="$URL/" \
            --collect.url="$URL/favorites"
        env:
          URL: ${{ steps.target.outputs.url }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: ignore
