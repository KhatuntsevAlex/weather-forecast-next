name: Lighthouse CI

on:
  # Runs after Vercel (or any provider) reports a deployment_status = success.
  # This audits the real preview / production URL instead of a local build.
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to audit (defaults to production)"
        required: false
        default: "https://weather-forecast-next-one.vercel.app"

concurrency:
  group: lighthouse-${{ github.event.deployment_status.deployment_url || github.event.inputs.url || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse (desktop)
    # Only run for successful deployments (skip pending/error/failure states)
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Resolve target URL
        id: target
        run: |
          URL="${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url || github.event.inputs.url }}"
          if [ -z "$URL" ]; then
            URL="https://weather-forecast-next-one.vercel.app"
          fi
          # Strip trailing slash
          URL="${URL%/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Auditing: $URL"

      - name: Run Lighthouse CI against live URL
        run: |
          npx --yes @lhci/cli@latest autorun \
            --config=./lighthouserc.live.json \
            --collect.url="$URL" \
            --collect.url="$URL/favorites" \
            --collect.settings.extraHeaders="{\"x-vercel-protection-bypass\":\"${BYPASS}\"}"
        env:
          URL: ${{ steps.target.outputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPENWEATHER_BASE_URL: ${{ secrets.OPENWEATHER_BASE_URL }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: ignore
