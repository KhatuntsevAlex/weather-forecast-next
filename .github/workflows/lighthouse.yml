name: Lighthouse CI

on:
  # Runs after Vercel (or any provider) reports a deployment_status = success.
  # This audits the real preview / production URL instead of a local build.
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to audit (defaults to production)"
        required: false
        default: "https://weather-forecast-next-one.vercel.app"

concurrency:
  group: lighthouse-${{ github.event.deployment_status.deployment_url || github.event.inputs.url || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse (desktop)
    # Run for any successful deployment (production or preview) or manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Resolve target URL and config
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_ENV: ${{ github.event.deployment_status.environment }}
          DEPLOY_URL: ${{ github.event.deployment_status.environment_url }}
          DEPLOY_TARGET_URL: ${{ github.event.deployment_status.target_url }}
          INPUT_URL: ${{ github.event.inputs.url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          # Production: always audit the stable public alias, no bypass, strict config.
          # Preview:    audit the deployment URL with bypass, relaxed config
          #             (SEO capped ~0.63 due to Vercel's X-Robots-Tag: noindex).
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$DEPLOY_ENV" = "Production" ]; then
            URL="${INPUT_URL:-https://weather-forecast-next-one.vercel.app}"
            CONFIG="./lighthouserc.live.json"
            QS=""
          else
            URL="${DEPLOY_URL:-$DEPLOY_TARGET_URL}"
            CONFIG="./lighthouserc.preview.json"
            QS="?x-vercel-protection-bypass=${BYPASS}&x-vercel-set-bypass-cookie=samesitenone"
          fi
          URL="${URL%/}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          echo "qs=$QS" >> "$GITHUB_OUTPUT"
          echo "Auditing: $URL (config=$CONFIG)"

      - name: Warm up URLs
        run: |
          for i in 1 2 3; do
            curl -s -o /dev/null "${URL}/${QS}" || true
            curl -s -o /dev/null "${URL}/favorites${QS}" || true
            sleep 2
          done
        env:
          URL: ${{ steps.target.outputs.url }}
          QS: ${{ steps.target.outputs.qs }}

      - name: Run Lighthouse CI against live URL
        run: |
          npx --yes @lhci/cli@latest autorun \
            --config="$CONFIG" \
            --collect.url="${URL}/${QS}" \
            --collect.url="${URL}/favorites${QS}"
        env:
          URL: ${{ steps.target.outputs.url }}
          QS: ${{ steps.target.outputs.qs }}
          CONFIG: ${{ steps.target.outputs.config }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
          if-no-files-found: ignore
